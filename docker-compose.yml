services:
  postgres:
    image: postgres:16
    container_name: deployai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: deployai
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deployai-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/deployai
      - NODE_ENV=development
    depends_on:
      - postgres
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deployai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  deployment-engine:
    build:
      context: ./deployment-engine
      dockerfile: Dockerfile
    container_name: deployai-engine
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/deployai
      - PORT=3002
    depends_on:
      - postgres
    volumes:
      - ./deployment-engine:/app
      - /app/node_modules
      - ./backend:/backend

volumes:
  postgres_data:
